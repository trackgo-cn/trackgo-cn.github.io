# SITE SETUP
# Guide: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

# Appearance
appearance:
  mode: light
  color: indigo

# SEO
marketing:
  seo:
    site_type: Person
    local_business_type: ""
    org_name: ""
    description: "A highly-customizable Hugo landing page theme powered by Hugo Blox website builder."
    twitter: "GetResearchDev"
  analytics:
    google_analytics: ""
    baidu_tongji: ""
    plausible: ""
    fathom: ""
    pirsch: ""
  verification:
    google: ""
    baidu: ""

# Site header
header:
  navbar:
    enable: true
    blox: "navbar"
    align: "center"
    fixed_to_top: true
    logo:
      text: ""
      # Logo filename in `assets/media/` folder
      filename: "logo.svg"
    button:
      enable: true
      text: "联系我们"
      url: "/#contact"
    show_search: false
    show_theme_chooser: true

# Site footer
footer:
  copyright:
    notice: "© {year} 东营特优拟体育科技有限责任公司. 保留所有权利。"

# Localization
locale:
  date_format: "Jan 2, 2006"
  time_format: "3:04 PM"
